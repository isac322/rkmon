version: 2

project_name: rkmon

before:
  hooks:
    - go mod tidy

builds:
  - id: rkmon
    main: ./cmd/rkmon
    binary: rkmon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -trimpath
      - -tags=netgo,osusergo
    ldflags:
      - -s -w
      - -extldflags '-static'
      - -X main.Version={{.Version}}
      - -X main.GitSHA={{.ShortCommit}}

archives:
  - id: rkmon
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: isac322
    name: rkmon
  draft: false
  prerelease: auto
  name_template: "rkmon {{.Tag}}"
  header: |
    ## rkmon {{.Tag}}

    RK3588 hardware monitor TUI. See the [README](https://github.com/isac322/rkmon#readme) for install and usage.
  footer: |
    ---
    {{- if gt (len .PreviousTag) 0 }}
    **Full Changelog**: https://github.com/isac322/rkmon/compare/{{ .PreviousTag }}...{{ .Tag }}
    {{- else }}
    First public release. See the [README](https://github.com/isac322/rkmon#readme) for everything {{ .Tag }} ships with.
    {{- end }}
