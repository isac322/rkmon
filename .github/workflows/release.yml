name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GOTOOLCHAIN: local

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Verify go test before release
        run: go test ./...

      - name: goreleaser build + archive (no publish yet)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish

      - name: Verify static-linked binary BEFORE publish
        run: |
          set -e
          archive=$(ls dist/rkmon_*_linux_arm64.tar.gz)
          mkdir -p /tmp/extract
          tar -xzf "$archive" -C /tmp/extract
          file /tmp/extract/rkmon
          file /tmp/extract/rkmon | grep -q "statically linked" \
            || (echo "::error::would-be-released binary is NOT statically linked"; exit 1)
          echo "OK static binary verified: $archive"

      - name: goreleaser publish (uses pre-built dist/)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
