name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: cross-compile linux/arm64 static binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -tags 'netgo,osusergo' \
            -ldflags "-s -w -extldflags '-static' -X main.Version=ci -X main.GitSHA=${GITHUB_SHA::7}" \
            -o /tmp/rkmon ./cmd/rkmon
          file /tmp/rkmon
          file /tmp/rkmon | grep -q "statically linked" || (echo "::error::binary is NOT statically linked"; exit 1)

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m
