name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: go test (-race)
        run: go test -race -count=1 ./...

      - name: cross-compile linux/arm64 static binary (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --clean --snapshot

      - name: verify static linkage
        run: |
          bin=$(find dist -type f -name rkmon | head -1)
          file "$bin"
          file "$bin" | grep -q "statically linked" \
            || (echo "::error::binary is NOT statically linked"; exit 1)

      - name: upload snapshot binary
        uses: actions/upload-artifact@v4
        with:
          name: rkmon-snapshot-linux-arm64
          path: dist/rkmon_linux_*_v*/rkmon
          if-no-files-found: error
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
